<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETLIST — Backstage</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="site-topbar">
    <span class="topbar-label">Pascal solo acoustic · <a href="/" class="topbar-link">Book here</a></span>
    <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-backdrop" id="navBackdrop" aria-hidden="true"></div>
  <aside class="nav-panel" id="navPanel" aria-hidden="true" role="dialog" aria-label="Navigation">
    <div class="nav-header">
      <span class="nav-header-label">Menu</span>
      <button class="nav-close" id="navClose" aria-label="Close menu">&times;</button>
    </div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/singalong/">Singalong</a></li>
    </ul>
    <div class="nav-footer">
      <span>Bookings</span>
      <a href="mailto:pascal.zuta@gmail.com">pascal.zuta@gmail.com</a>
    </div>
  </aside>
  <header>
    <a class='logo' href='/singalong/'>Setlist</a>
    <a class='backstage-btn' href='/singalong/'>Exit</a>
  </header>

  <!-- Password gate -->
  <div id="gate" class="gate">
    <div class="gate-inner">
      <label class="form-label" for="gate-input">Password</label>
      <input class="form-input" id="gate-input" type="password" placeholder="Enter password" autofocus>
      <button class="save-btn" style="margin-top:1rem;width:100%" onclick="checkPassword()">Enter</button>
      <p id="gate-error" class="gate-error"></p>
    </div>
  </div>

  <!-- Admin content (hidden until authenticated) -->
  <div class="admin-layout" id="admin" style="display:none">
    <div class="admin-sidebar" id="sidebar">
      <div class="loading" style="padding: 1.5rem;">Loading</div>
    </div>
    <div class="admin-editor admin-editor-empty" id="editor">
      Select a song
    </div>
  </div>

  <script>
    (function(){
      var btn=document.getElementById('navToggle'),p=document.getElementById('navPanel'),
          bd=document.getElementById('navBackdrop'),cl=document.getElementById('navClose');
      function open(){p.classList.add('open');bd.classList.add('open');btn.setAttribute('aria-expanded','true');p.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function close(){p.classList.remove('open');bd.classList.remove('open');btn.setAttribute('aria-expanded','false');p.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      btn.addEventListener('click',function(){p.classList.contains('open')?close():open();});
      cl.addEventListener('click',close);
      bd.addEventListener('click',close);
      document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
    })();
  </script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
