<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETLIST</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-panel" id="navPanel">
    <a href="/">Home</a>
    <a href="/singalong/">Singalong</a>
  </nav>
  <header>
    <a class='logo' href='/singalong/'>Setlist</a>
    <a class='backstage-btn' href='/singalong/admin/'>Backstage</a>
  </header>
  <main id="app">
    <div class="loading">Loading</div>
  </main>
  <script>
    (function(){var b=document.getElementById('navToggle'),p=document.getElementById('navPanel');
    function c(){p.classList.remove('open');b.setAttribute('aria-expanded','false');}
    b.addEventListener('click',function(e){e.stopPropagation();var o=p.classList.toggle('open');b.setAttribute('aria-expanded',o?'true':'false');});
    document.addEventListener('click',function(e){if(!p.contains(e.target)&&e.target!==b)c();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')c();});})();
  </script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
